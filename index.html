<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>共通テスト数学ⅠA</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="app-shell">

  <!-- ===== 上部 ===== -->
  <header class="topbar">
    <div>
      <div class="brand-sub">KYOTSU TEST</div>
      <h1>共通テスト数学ⅠA</h1>
    </div>

    <div>
      正答:<span id="correctCnt">0</span> /
      解答:<span id="totalCnt">0</span>
      （<span id="rateCnt">0%</span>）
    </div>
  </header>

  <!-- ===== 本体 ===== -->
  <main class="main-layout">

    <!-- 左（最小情報） -->
    <aside class="left-panel">
      <div>計算:<span id="wCalc">0</span></div>
      <div>方針:<span id="wSwitch">0</span></div>
      <div>時間:<span id="wTime">0</span></div>

      <hr>

      <button onclick="startExam()">開始</button>
      <button onclick="startWrongOnlyReview()">復習</button>
      <button onclick="toggleMemo()">メモ</button>
    </aside>

    <!-- 中央（最重要） -->
    <section class="center-panel">

      <!-- 問題 -->
      <div id="questionPanel" class="question-panel">

        <!-- 上段 -->
        <div class="question-meta">
          <div>
            <span id="qStageLabel">第1問</span>
            <span id="qScoreLabel">10点</span>
          </div>

          <div id="timer" class="timer">--</div>
        </div>

        <!-- 問題文 -->
        <div>
          <div id="questionText" class="question-text"></div>
          <div id="svgBox"></div>
        </div>

        <!-- 下段 -->
        <div class="options-box">

          <!-- 選択肢 -->
          <div class="options-list" id="optionsBox">
            <!-- JSで生成 -->
          </div>

          <!-- メモ（ここ重要：同一画面内） -->
          <div>
            <canvas id="memoCanvas"></canvas>
          </div>

        </div>

        <!-- フィードバック -->
        <div id="feedback" class="feedback"></div>

        <!-- 操作 -->
        <div>
          <button onclick="nextQuestion()">次へ</button>
          <button onclick="skipQuestion()">飛ばす</button>
        </div>

      </div>
    </section>

  </main>
</div>

<script src="questions.js"></script>
<script src="app.js"></script>
</body>
</html>
