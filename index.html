<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>共通テスト数学ⅠA</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- 上バー -->
  <div class="topbar">
    <div>共通テスト数学ⅠA</div>
    <div>
      正答 <span id="correctCnt">0</span> /
      解答 <span id="totalCnt">0</span>
    </div>
  </div>

  <!-- メイン -->
  <div class="main">

    <!-- 左（最小情報） -->
    <div class="side">
      <div>計算:<span id="wCalc">0</span></div>
      <div>方針:<span id="wSwitch">0</span></div>
      <div>時間:<span id="wTime">0</span></div>

      <button onclick="startExam()">開始</button>
      <button onclick="startReview()">復習</button>
    </div>

    <!-- 中央 -->
    <div class="center">

      <!-- 問題 -->
      <div class="question-box">

        <div class="meta">
          <div id="qStageLabel">第1問</div>
          <div id="timer">--</div>
        </div>

        <div id="questionText" class="question"></div>

        <div class="bottom">

          <!-- 選択肢 -->
          <div id="options" class="options"></div>

          <!-- メモ -->
          <canvas id="memo"></canvas>

        </div>

        <div id="feedback"></div>

        <button onclick="next()">次へ</button>

      </div>

    </div>

  </div>

</div>

<script src="questions.js"></script>
<script src="app.js"></script>
</body>
</html>
